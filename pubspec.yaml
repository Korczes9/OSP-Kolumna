name: osp_kolumna
description: >-
  OSP Kolumna - Aplikacja mobilna dla Ochotniczej Straży Pożarnej Kolumna.
  Umożliwia zarządzanie alarmami, dyżurami i komunikacją między strażakami.

publish_to: 'none'

version: 1.0.25+26

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Design i UI
  cupertino_icons: ^1.0.2
  google_fonts: ^8.0.0

  # Nawigacja - otwieranie map i URL'i
  url_launcher: ^6.2.5

  # Firebase - obsługa push notyfikacji i bazy danych
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  firebase_database: ^12.1.2
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6
  flutter_local_notifications: ^17.2.3

  # HTTP i REST API
  http: ^1.1.0
  html: ^0.15.4

  # Local storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # Network connectivity
  connectivity_plus: ^6.1.1

  # Inne
  provider: ^6.1.0
  intl: ^0.20.2
  pdf: ^3.10.7
  printing: ^5.12.0
  csv: ^6.0.0
  audioplayers: ^6.1.0
  file_picker: ^8.0.0+1
  excel: ^4.0.2
  image_picker: ^1.0.7
  google_maps_flutter: ^2.5.0
  google_places_flutter: ^2.0.9
  # google_maps_cluster_manager: ^3.0.0+1  # Tymczasowo wyłączone - konflikt z google_maps_flutter
  flutter_email_sender: ^6.0.2
  geocoding: ^4.0.0
  geolocator: ^13.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "ikona kolumna.png"
  adaptive_icon_background: "#FF0000"
  adaptive_icon_foreground: "ikona kolumna.png"

flutter:
  uses-material-design: true

  # Ikony i czcionki
  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - assets/sounds/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
